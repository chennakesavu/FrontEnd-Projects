
<!-- example on custom animations -->
<!DOCTYPE html>
<html lang="en">
 <head>
    <title>CSS Animations</title>
	<style>
		@keyframes myanim
		{
			from{ background:red; }
			to{ background:blue;	}
		}
		h1{
			animation-name:myanim;
			animation-duration:4s;
		}
	</style>
 </head>
 <body>
		<h3>demo on 2 point custom animation</h3>
		<h1>Hypertext Markup Language</h1>
		<h1>Cascading Style Sheets</h1>
		<h1>JavaScript</h1>
 </body>
</html>
