<!-- example css transforms -->
<!DOCTYPE html>
<html lang="en">
 <head>
    <title>Transform</title>
	<style>
		div{
			width:100px;		
			height:100px;		
			background:#33ffff;
			/* transform:translateX(300px) or  translateY(300px) or translateZ(300px) or translate(200px, 200px)	*/
			/* transform:scaleX(2) or  scaleY(2) or scaleZ(2) or  scale(2)	
						1 -> 100%	*/
			/* transform:rotateX(130deg) or  rotateY(130deg) or rotateZ(130deg)	
													-deg or +deg	*/
			/* transform:skewX(10deg)  or skewY(15deg) or skew(15deg, 10deg) 
										-deg  or  +deg		*/
			transform:translate(200px, 200px) rotate(200deg);
        }
	</style>
 </head>
 <body>
	<h3>demo on transform functions</h3>
	<div><h1>Hello</h1></div>
 </body>
</html>
